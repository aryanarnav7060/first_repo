<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATHER.WEB | Live News Network</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

body{
background:#020617;
overflow-x:hidden;
transition:.3s;
}

body.light{
background:#e2e8f0;
}

.liquid-glass{
backdrop-filter:blur(25px) saturate(180%);
-webkit-backdrop-filter:blur(25px) saturate(180%);
background:rgba(15,23,42,.65);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 10px 40px rgba(0,0,0,.25);
}

body.light .liquid-glass{
background:rgba(255,255,255,.75);
border:1px solid rgba(0,0,0,.08);
}

.news-card{
transition:.4s;
}

.news-card:hover{
transform:translateY(-6px);
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.7);
z-index:999;
}

.modal-content{
max-width:900px;
margin:auto;
margin-top:50px;
padding:30px;
border-radius:25px;
overflow-y:auto;
max-height:85vh;
}

.loader{
border:4px solid rgba(255,255,255,.1);
border-top:4px solid cyan;
width:40px;
height:40px;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>

</head>

<body class="text-slate-100">

<div class="fixed inset-0 pointer-events-none">

<div class="absolute w-[600px] h-[600px]
bg-cyan-500/20 blur-[120px]
top-[-10%] left-[-10%] rounded-full">
</div>

<div class="absolute w-[600px] h-[600px]
bg-indigo-500/20 blur-[120px]
bottom-[-10%] right-[-10%] rounded-full">
</div>

</div>

<header class="sticky top-0 z-50 p-4">

<div class="liquid-glass rounded-3xl max-w-7xl mx-auto p-5 flex flex-wrap justify-between items-center">

<div>

<h1 class="font-black text-3xl">
ATHER<span class="text-cyan-400">.WEB</span>
</h1>

<p class="text-xs text-slate-400">
LIVE SYNTHESIZED NEWS NETWORK
</p>

</div>

<div class="flex gap-2 flex-wrap">

<button onclick="setCategory('all')" class="category-btn px-4 py-2 rounded-xl bg-cyan-600">
All
</button>

<button onclick="setCategory('technology')" class="category-btn px-4 py-2 rounded-xl">
Technology
</button>

<button onclick="setCategory('sports')" class="category-btn px-4 py-2 rounded-xl">
Sports
</button>

<button onclick="setCategory('business')" class="category-btn px-4 py-2 rounded-xl">
Business
</button>

<button onclick="setCategory('gaming')" class="category-btn px-4 py-2 rounded-xl">
Gaming
</button>

</div>

<div class="flex gap-3">

<input
id="searchBox"
placeholder="Search News..."
class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-700">

<button
onclick="searchNews()"
class="bg-cyan-600 px-5 rounded-xl">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

<button
onclick="toggleTheme()"
class="bg-slate-800 px-4 rounded-xl">

<i class="fa-solid fa-moon"></i>

</button>

</div>

</div>

</header>

<section class="max-w-7xl mx-auto p-6">

<div class="liquid-glass rounded-3xl p-4 mb-6">

<marquee id="breakingTicker"
scrollamount="6">

Loading Breaking News...

</marquee>

</div>

<div id="news-grid"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-7">

<div class="flex justify-center col-span-full py-24">

<div class="loader"></div>

</div>

</div>

</section>

<div class="modal" id="newsModal">

<div class="modal-content liquid-glass">

<button
onclick="closeModal()"
class="float-right text-2xl">

×

</button>

<img
id="modalImage"
class="rounded-2xl mb-5">

<h1
id="modalTitle"
class="text-3xl font-black mb-4">
</h1>

<p
id="modalContent"
class="text-slate-300">
</p>

<a
id="sourceLink"
target="_blank"
class="inline-block mt-5 bg-cyan-600 px-6 py-3 rounded-xl">

Read Original Article

</a>

</div>

</div>

<script>


// ---------------- SETTINGS ----------------

let activeCategory = "all";
let page = 1;
let allArticles = [];
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];

// ---------------- CATEGORY SEARCH MAP ----------------

const categoryQueries = {
    all: "latest news",
    technology: "technology AI gadgets",
    sports: "sports football cricket olympics",
    business: "economy finance stock market",
    gaming: "gaming esports videogames"
};

// ---------------- LOAD NEWS ----------------

async function loadNews(reset=true){

    if(reset){
        page=1;
        allArticles=[];
    }

    const grid=document.getElementById("news-grid");

    if(reset){
        grid.innerHTML=`
        <div class="col-span-full flex justify-center py-24">
            <div class="loader"></div>
        </div>
        `;
    }

    try{

        const query=categoryQueries[activeCategory];

        const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;

        const url=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;

        const response=await fetch(url);

        const data=await response.json();

        const articles=data.items || [];

        allArticles=articles;

        renderNews(articles);

        createTicker(articles);

    }

    catch(error){

        grid.innerHTML=`
        <div class="col-span-full text-center text-red-400 py-20">
        Unable to load live feed.
        </div>
        `;

        console.log(error);

    }

}


// ---------------- RENDER NEWS ----------------

function renderNews(articles){

    const grid=document.getElementById("news-grid");

    let html="";

    articles.forEach((article,index)=>{

        let img=`https://picsum.photos/600/400?random=${index}`;

        if(article.thumbnail)
            img=article.thumbnail;

        html+=`

<div class="news-card liquid-glass rounded-3xl overflow-hidden">

<img
src="${img}"
class="w-full h-52 object-cover">

<div class="p-5">

<div class="text-xs text-cyan-400 mb-2">
${article.author || "Global Feed"}
</div>

<h2 class="font-bold text-lg mb-4">

${article.title}

</h2>

<p class="text-sm text-slate-400 line-clamp-3">

${article.description || "Live syndicated article"}

</p>

<div class="flex justify-between mt-6">

<button
onclick="openArticle(${index})"
class="bg-cyan-600 px-4 py-2 rounded-xl">

Expand

</button>

<button
onclick="saveBookmark(${index})"
class="bg-slate-800 px-4 py-2 rounded-xl">

<i class="fa-regular fa-bookmark"></i>

</button>

</div>

</div>

</div>

`;

    });

    grid.innerHTML=html;

}


// ---------------- OPEN ARTICLE ----------------

function openArticle(index){

    const article=allArticles[index];

    document.getElementById("newsModal").style.display="block";

    document.getElementById("modalTitle").innerHTML=
        article.title;

    document.getElementById("modalContent").innerHTML=
        article.description || "";

    document.getElementById("modalImage").src=
        article.thumbnail || "";

    document.getElementById("sourceLink").href=
        article.link;

}


// ---------------- CLOSE MODAL ----------------

function closeModal(){

    document.getElementById("newsModal").style.display="none";

}


// ---------------- SEARCH ----------------

async function searchNews(){

    const text=document.getElementById("searchBox").value;

    if(text===""){
        loadNews();
        return;
    }

    const grid=document.getElementById("news-grid");

    grid.innerHTML=`
    <div class="col-span-full flex justify-center py-20">
        <div class="loader"></div>
    </div>
    `;

    try{

        const rss=`https://news.google.com/rss/search?q=${encodeURIComponent(text)}&hl=en-US&gl=US&ceid=US:en`;

        const url=`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`;

        const response=await fetch(url);

        const data=await response.json();

        allArticles=data.items || [];

        renderNews(allArticles);

    }

    catch(error){

        console.log(error);

    }

}


// ---------------- CATEGORY ----------------

function setCategory(category){

    activeCategory=category;

    document.querySelectorAll(".category-btn").forEach(btn=>{

        btn.classList.remove("bg-cyan-600");

    });

    loadNews();

}


// ---------------- BREAKING TICKER ----------------

function createTicker(articles){

    let ticker="";

    articles.slice(0,10).forEach(article=>{

        ticker+=` 🔴 ${article.title} •`;

    });

    document.getElementById("breakingTicker").innerHTML=ticker;

}


// ---------------- THEME ----------------

function toggleTheme(){

    document.body.classList.toggle("light");

}


// ---------------- AUTO REFRESH ----------------

setInterval(()=>{

    loadNews(false);

},300000);


// ---------------- BOOKMARK ----------------

function saveBookmark(index){

    bookmarks.push(allArticles[index]);

    localStorage.setItem(

        "bookmarks",

        JSON.stringify(bookmarks)

    );

}


// ---------------- SHOW BOOKMARKS ----------------

function showBookmarks(){

    renderNews(bookmarks);

}


// ---------------- INFINITE SCROLL ----------------

window.addEventListener("scroll",()=>{

    if(

        window.innerHeight+

        window.scrollY

        >=

        document.body.offsetHeight-300

    ){

        loadNews(false);

    }

});


// ---------------- WEATHER ----------------

const weatherCities=[
"New Delhi",
"London",
"New York",
"Tokyo"
];

async function loadWeather(){

    let weatherHTML="";

    for(let city of weatherCities){

        try{

            let response=await fetch(

            `https://wttr.in/${encodeURIComponent(city)}?format=j1`

            );

            let data=await response.json();

            let current=data.current_condition[0];

            weatherHTML+=`

<div class="liquid-glass rounded-3xl p-5">

<div class="text-xs text-cyan-400 uppercase">

${city}

</div>

<div class="text-3xl font-black mt-2">

${current.temp_C}°C

</div>

<div class="text-slate-400 mt-2">

${current.weatherDesc[0].value}

</div>

<div class="mt-2 text-sm">

Humidity : ${current.humidity}%

</div>

</div>

`;

        }

        catch{

            weatherHTML+=`

<div class="liquid-glass rounded-3xl p-5">

<div class="text-red-400">

${city}

Offline

</div>

</div>

`;

        }

    }

}


// ---------------- FALLBACK FEEDS ----------------

const fallbackArticles=[

{
title:"Global markets react to fresh AI boom",
description:"Technology sector sees strong growth.",
link:"#",
author:"Reuters"
},

{
title:"New gaming hardware launches this week",
description:"Manufacturers unveil next generation GPUs.",
link:"#",
author:"IGN"
},

{
title:"Sports leagues announce upcoming tournaments",
description:"International championships set for summer.",
link:"#",
author:"ESPN"
}

];


// ---------------- ARTICLE IMAGE FIX ----------------

function getImage(article,index){

    if(article.thumbnail && article.thumbnail!=""){

        return article.thumbnail;

    }

    return `https://picsum.photos/600/400?random=${index}`;

}


// ---------------- READING TIME ----------------

function readingTime(text){

    if(!text)return "1 min read";

    let words=text.split(" ").length;

    let minutes=Math.ceil(words/200);

    return `${minutes} min read`;

}


// ---------------- DATE FORMAT ----------------

function formatDate(dateString){

    try{

        let date=new Date(dateString);

        return date.toLocaleString();

    }

    catch{

        return "Recently";

    }

}


// ---------------- SOURCE NAME ----------------

function sourceName(article){

    if(article.author){

        return article.author;

    }

    return "Global Syndicate";

}


// ---------------- LOAD FAIL SAFE ----------------

async function safeLoadNews(){

    try{

        await loadNews();

    }

    catch{

        allArticles=fallbackArticles;

        renderNews(allArticles);

    }

}


// ---------------- ARTICLE SHARING ----------------

function shareArticle(index){

    let article=allArticles[index];

    navigator.share({

        title:article.title,

        text:article.description,

        url:article.link

    });

}


// ---------------- KEYBOARD SEARCH ----------------

document.addEventListener(

"keydown",

function(e){

    if(e.key==="Enter"){

        searchNews();

    }

});


// ---------------- LAZY IMAGE LOADING ----------------

document.addEventListener(

"DOMContentLoaded",

()=>{

    document.querySelectorAll("img").forEach(img=>{

        img.loading="lazy";

    });

});


// ---------------- MODAL CLOSE ----------------

window.onclick=function(event){

    let modal=document.getElementById("newsModal");

    if(event.target===modal){

        closeModal();

    }

};


// ---------------- ESC KEY CLOSE ----------------

document.addEventListener(

"keydown",

function(e){

    if(e.key==="Escape"){

        closeModal();

    }

});


// ---------------- SMOOTH SCROLL ----------------

document.documentElement.style.scrollBehavior="smooth";


// ---------------- PAGE LOADER ----------------

window.addEventListener(

"load",

()=>{

    document.body.style.opacity="1";

});


// ---------------- CONNECTION STATUS ----------------

window.addEventListener(

"offline",

()=>{

    document.getElementById(

        "breakingTicker"

    ).innerHTML=

    "⚠ Offline mode enabled";

});

window.addEventListener(

"online",

()=>{

    document.getElementById(

        "breakingTicker"

    ).innerHTML=

    "🟢 Connection restored";

});


// ---------------- TOP BUTTON ----------------

const topBtn=document.createElement("button");

topBtn.innerHTML='<i class="fa-solid fa-arrow-up"></i>';

topBtn.className=`
fixed bottom-8 right-8
bg-cyan-600
w-14 h-14
rounded-full
shadow-xl
z-50
hidden
`;

document.body.appendChild(topBtn);

window.addEventListener("scroll",()=>{

    if(window.scrollY>500){

        topBtn.classList.remove("hidden");

    }

    else{

        topBtn.classList.add("hidden");

    }

});

topBtn.onclick=()=>{

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

};


// ---------------- START APP ----------------

safeLoadNews();

loadWeather();


// ---------------- REFRESH EVERY 5 MINUTES ----------------

setInterval(()=>{

    safeLoadNews();

    loadWeather();

},300000);


// ---------------- WELCOME MESSAGE ----------------

console.log(

"%cATHER.WEB LIVE NETWORK ONLINE",

"color:cyan;font-size:20px;font-weight:bold"

);


// ---------------- END ----------------

</script>

</body>

</html>
